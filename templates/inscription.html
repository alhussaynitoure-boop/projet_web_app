{% extends "base.html" %} {% block title %}Inscription{% endblock %} {% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
     :root {
        --cyan: #00e5ff;
        --pink: #ff2d78;
        --bg: #0d0d0d;
        --surface: #161616;
        --border: #2a2a2a;
        --input-bg: #1c1c1c;
        --text: #e8e8e8;
        --muted: #6a6a6a;
        --radius: 12px;
    }
    
    .auth-wrapper {
        background: var(--bg);
        min-height: calc(100vh - 64px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
        font-family: 'DM Sans', sans-serif;
        color: var(--text);
    }
    /* ── carte ────────────────────────────────────── */
    
    .auth-card {
        position: relative;
        width: 100%;
        max-width: 500px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 44px 40px 40px;
        overflow: hidden;
    }
    
    .auth-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--cyan), var(--pink));
    }
    
    .auth-card::after {
        content: '';
        position: absolute;
        top: -80px;
        right: -80px;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, rgba(0, 229, 255, .06) 0%, transparent 70%);
        pointer-events: none;
    }
    /* ── titre ────────────────────────────────────── */
    
    .auth-card h1 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 26px;
        color: var(--text);
        margin: 0 0 28px;
        text-align: center;
    }
    /* ── flash ────────────────────────────────────── */
    
    .alert {
        padding: 11px 16px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .alert-danger {
        background: rgba(255, 45, 120, .12);
        border: 1px solid rgba(255, 45, 120, .3);
        color: #ff2d78;
    }
    
    .alert-success {
        background: rgba(0, 229, 255, .10);
        border: 1px solid rgba(0, 229, 255, .3);
        color: var(--cyan);
    }
    
    .alert-warning {
        background: rgba(255, 160, 0, .10);
        border: 1px solid rgba(255, 160, 0, .3);
        color: #ffa000;
    }
    
    .alert-info {
        background: rgba(100, 180, 255, .10);
        border: 1px solid rgba(100, 180, 255, .3);
        color: #64b4ff;
    }
    /* ── form ─────────────────────────────────────── */
    
    .auth-card form {
        display: flex;
        flex-direction: column;
    }
    /* grille 2 colonnes pour grands écrans */
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 20px;
    }
    
    @media (max-width: 520px) {
        .form-row {
            grid-template-columns: 1fr;
        }
        .auth-card {
            padding: 36px 24px 32px;
        }
    }
    
    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
    }
    
    .auth-card label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
    }
    
    .auth-card input[type="text"],
    .auth-card input[type="email"],
    .auth-card input[type="password"],
    .auth-card select {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        padding: 13px 16px;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        appearance: none;
    }
    
    .auth-card input::placeholder {
        color: #444;
    }
    
    .auth-card input:focus,
    .auth-card select:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, .08);
    }
    /* select arrow custom */
    
    .select-wrapper {
        position: relative;
    }
    
    .select-wrapper::after {
        content: '▾';
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
        font-size: 13px;
    }
    
    .auth-card select option {
        background: var(--surface);
        color: var(--text);
    }
    /* ── bouton submit ────────────────────────────── */
    
    .auth-card button[type="submit"] {
        margin-top: 10px;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: var(--radius);
        background: linear-gradient(135deg, #ff6b6b, #ff2d78, #a855f7);
        color: #fff;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: .5px;
        cursor: pointer;
        transition: opacity .2s, transform .15s;
    }
    
    .auth-card button[type="submit"]:hover {
        opacity: .9;
        transform: translateY(-1px);
    }
    
    .auth-card button[type="submit"]:active {
        transform: translateY(0);
    }
    /* ── lien connexion ───────────────────────────── */
    
    .auth-card>p {
        margin-top: 24px;
        text-align: center;
        font-size: 13.5px;
        color: var(--muted);
    }
    
    .auth-card>p a {
        color: var(--cyan);
        text-decoration: none;
        font-weight: 500;
        transition: opacity .2s;
    }
    
    .auth-card>p a:hover {
        opacity: .75;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">

        <h1>📝 Créer un compte</h1>
        <div class="alert alert-{{ category }}"></div>
        <form method="POST">

            <div class="form-row">
                <div class="form-group">
                    <label>Nom complet *</label>
                    <input type="text" name="nom" required placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required placeholder="votre@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>Téléphone</label>
                <input type="text" name="telephone" placeholder="05 XX XX XX XX">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Mot de passe *</label>
                    <input type="password" name="motDePasse" required placeholder="Min. 6 caractères">
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe *</label>
                    <input type="password" name="confirmerMotDePasse" required placeholder="Répétez le mot de passe">
                </div>
            </div>

            <div class="form-group">
                <label>Type de compte *</label>
                <div class="select-wrapper">
                    <select name="role" required>
            <option value="ACHETEUR">Acheteur (je cherche un bien)</option>
            <option value="VENDEUR">Vendeur (je veux publier)</option>
          </select>
                </div>
            </div>

            <button type="submit">S'inscrire</button>

        </form>

        <p>Déjà un compte ? <a href="{{ url_for('auth.connexion') }}">Se connecter</a></p>

    </div>
</div>

{% endblock %}
